services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: online-code-compiler:latest
    container_name: code-compile
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
